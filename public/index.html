<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d0d0d;--surface:#161616;--surface2:#1f1f1f;--border:#2a2a2a;--accent:#e8ff47;--accent2:#47ffd4;--text:#f0f0f0;--muted:#666;--danger:#ff4747}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .app{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
    .logo{font-family:'DM Mono',monospace;font-size:15px;letter-spacing:2px;color:var(--accent)}
    .nav-pills{display:flex;gap:6px}
    .nav-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .15s}
    .nav-btn:hover,.nav-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.06)}
    .user-tag{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:8px}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--accent2)}
    .logout-btn{background:transparent;border:none;color:var(--danger);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-left:12px}
    .view{display:none;padding:32px 24px;max-width:540px;margin:0 auto;width:100%}
    .view.active{display:block}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px}
    h2{font-size:22px;font-weight:600;margin-bottom:6px}
    .sub{font-size:14px;color:var(--muted);margin-bottom:24px}
    .field{margin-bottom:16px}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;font-family:'DM Mono',monospace}
    input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
    input:focus{border-color:var(--accent)}
    .btn{width:100%;padding:11px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .15s;margin-top:4px}
    .btn-primary{background:var(--accent);color:#000}
    .btn-primary:hover{background:#d4eb38}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);margin-top:8px}
    .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
    .msg-box{padding:8px 0;font-size:13px;color:var(--danger);min-height:20px;text-align:center}
    .users-list{display:flex;flex-direction:column;gap:8px;margin-top:20px}
    .user-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .15s}
    .user-row:hover{border-color:var(--accent2)}
    .avatar{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--accent2);flex-shrink:0}
    .uname{font-size:14px;font-weight:500}
    .uemail{font-size:12px;color:var(--muted)}
    .send-btn{background:rgba(71,255,212,.1);border:1px solid rgba(71,255,212,.3);color:var(--accent2);padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
    .send-btn:hover{background:rgba(71,255,212,.2)}
    .chat-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
    .chat-msgs{display:flex;flex-direction:column;gap:10px;min-height:180px;max-height:300px;overflow-y:auto;padding:4px 0;margin-bottom:16px}
    .bubble{padding:9px 14px;border-radius:10px;font-size:14px;max-width:80%;line-height:1.5}
    .bubble.received{background:var(--surface);border:1px solid var(--border);align-self:flex-start;color:var(--text)}
    .bubble.sent{background:rgba(232,255,71,.1);border:1px solid rgba(232,255,71,.2);align-self:flex-end;color:var(--accent)}
    .compose{display:flex;gap:8px}
    .compose input{flex:1}
    .send-icon-btn{background:var(--accent);border:none;border-radius:8px;width:42px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
    .inbox-list{display:flex;flex-direction:column;gap:8px;margin-top:20px}
    .inbox-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .15s}
    .inbox-row:hover{border-color:var(--accent)}
    .badge{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
    .sender-name{font-size:14px;font-weight:500}
    .hint{font-size:12px;color:var(--muted);margin-top:4px}
    .empty{text-align:center;color:var(--muted);font-size:14px;padding:32px 0}
    .back-btn{width:auto;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif}
    .back-btn:hover{border-color:var(--accent);color:var(--accent)}
  </style>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

<div class="app">
  <div class="topbar">
    <span class="logo">CHATAPP</span>
    <div class="nav-pills" id="nav" style="display:none">
      <button class="nav-btn" onclick="showView('users')">users</button>
      <button class="nav-btn" onclick="showView('inbox')">inbox</button>
    </div>
    <div class="user-tag" id="user-tag" style="display:none">
      <span class="dot"></span>
      <span id="logged-email"></span>
      <button class="logout-btn" onclick="logout()">logout</button>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="view-login" class="view active">
    <div style="padding-top:40px"></div>
    <div class="card">
      <h2>sign in</h2>
      <p class="sub">welcome back</p>
      <div class="field">
        <label>email</label>
        <input id="login-email" type="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>password</label>
        <input id="login-pass" type="password" placeholder="••••••••">
      </div>
      <div class="msg-box" id="login-msg"></div>
      <button class="btn btn-primary" onclick="doLogin()">sign in</button>
      <button class="btn btn-ghost" onclick="showView('register')">no account? register →</button>
    </div>
  </div>

  <!-- REGISTER -->
  <div id="view-register" class="view">
    <div style="padding-top:40px"></div>
    <div class="card">
      <h2>create account</h2>
      <p class="sub">get started</p>
      <div class="field">
        <label>name</label>
        <input id="reg-name" placeholder="your name">
      </div>
      <div class="field">
        <label>email</label>
        <input id="reg-email" type="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>password</label>
        <input id="reg-pass" type="password" placeholder="min 8 chars">
      </div>
      <div class="msg-box" id="reg-msg"></div>
      <button class="btn btn-primary" onclick="doRegister()">create account</button>
      <button class="btn btn-ghost" onclick="showView('login')">← back to login</button>
    </div>
  </div>

  <!-- USERS -->
  <div id="view-users" class="view">
    <h2>users</h2>
    <p class="sub">click a user to open chat, or tap the message button</p>
    <div id="users-list" class="users-list">
      <div class="empty">loading users…</div>
    </div>
  </div>

  <!-- CHAT -->
<div id="view-chat" class="view">
  <div class="chat-header">
    <button class="back-btn" onclick="showView('users')">← back</button>
    <div class="avatar" id="chat-avatar">?</div>
    <div style="flex:1">
      <div class="uname" id="chat-name">-</div>
      <div class="uemail" id="chat-email-label">-</div>
    </div>
    <div style="position:relative">
      <button class="back-btn" onclick="toggleChatMenu(event)">⋮</button>
      <div id="chat-menu" style="display:none;position:absolute;right:0;top:32px;background:var(--surface);border:1px solid var(--border);border-radius:8px;min-width:160px;z-index:10;overflow:hidden">
        <div onclick="deleteChat()" style="padding:10px 14px;font-size:13px;cursor:pointer;color:var(--danger);transition:background .15s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='transparent'">🗑 delete chat for everyone</div>
      </div>
    </div>
  </div>
  <div class="chat-msgs" id="chat-msgs">
    <div class="empty">no messages yet</div>
  </div>
  <div class="compose">
    <input id="msg-input" placeholder="type a message…" onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="send-icon-btn" onclick="sendMsg()">↑</button>
  </div>
</div>
  <!-- INBOX -->
  <div id="view-inbox" class="view">
    <h2>inbox</h2>
    <p class="sub">people who messaged you</p>
    <div id="inbox-list" class="inbox-list">
      <div class="empty">loading…</div>
    </div>
  </div>
</div>

<script>
  let token = null;
  let myEmail = null;
  let chatTarget = null;

  // ─── NAVIGATION ───────────────────────────────────────────────
  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const navBtn = document.querySelector(`.nav-btn[onclick*="${name}"]`);
    if (navBtn) navBtn.classList.add('active');
    if (name === 'users') loadUsers();
    if (name === 'inbox') loadInbox();
  }

  function setMsg(id, text, isError = true) {
    const el = document.getElementById(id);
    el.style.color = isError ? 'var(--danger)' : 'var(--accent2)';
    el.textContent = text;
  }
  // ─── AUTH ──────────────────────────────────────────────────────           
  let socket;
  async function doLogin() {

    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-pass').value;
    if (!email || !password) { setMsg('login-msg', 'fill in all fields'); return; }

    // TODO: uncomment and remove the demo block below
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { setMsg('login-msg', data.message || 'login failed'); return; }
    token = data.message;  // your backend returns { message: token }
    myEmail = email;

    socket = io( {
      auth: { token: token }
    });

    socket.on('connect', () => {
      console.log('socket connected:', socket.id); // ← check this
    });

    socket.on('newMessage', (data) => {
  // only show if we're in that chat
  if (data.from === chatTarget) {
    const el = document.getElementById('chat-msgs');
    el.innerHTML = el.innerHTML.replace('<div class="empty">no messages yet</div>', '');
    el.innerHTML += `<div class="bubble received">${data.msg}</div>`;
    el.scrollTop = el.scrollHeight;
  }

   }); 
   socket.on('chatDeleted', ({ from }) => {
  if (chatTarget === from) {
    document.getElementById('chat-msgs').innerHTML = '<div class="empty">no messages yet</div>';
  }
});



    onLoggedIn();

    // DEMO: simulated login (remove this block when using real API)
    // token = 'demo-token';
    // myEmail = email;
    // onLoggedIn();
  }



  async function doRegister() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-pass').value;
    if (!name || !email || !password) { setMsg('reg-msg', 'fill in all fields'); return; }

    // TODO: uncomment below
    const res = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!res.ok) { setMsg('reg-msg', data.error || 'registration failed'); return; }
     setMsg('reg-msg', 'account created! signing in…', false);
     setTimeout(() => showView('login'), 1000); 
    
  }
  
  function onLoggedIn() {
    document.getElementById('nav').style.display = 'flex';
    document.getElementById('user-tag').style.display = 'flex';
    document.getElementById('logged-email').textContent = myEmail;
    showView('users');
  }
 
function logout() {
  if (socket) socket.disconnect();
  token = null; myEmail = null; chatTarget = null;
  document.getElementById('nav').style.display = 'none';
  document.getElementById('user-tag').style.display = 'none';
  showView('login');
}
  // ─── USERS ────────────────────────────────────────────────────
 
  async function loadUsers() {
    
    const res = await fetch('/users', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    renderUsers(data.data);

    // DEMO
    // renderUsers([
    //   { email: 'alice@example.com', name: 'Alice' },
    //   { email: 'bob@example.com', name: 'Bob' },
    //   { email: 'carol@example.com', name: 'Carol' }
    // ]);
  }
 
  function renderUsers(users) {
    const el = document.getElementById('users-list');
    const filtered = users.filter(u => u.email !== myEmail);
    if (!filtered.length) { el.innerHTML = '<div class="empty">no other users found</div>'; return; }
    el.innerHTML = filtered.map(u => `
      <div class="user-row" onclick="openChat('${u.email}','${u.name || u.email}')">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="avatar">${(u.name || u.email)[0].toUpperCase()}</div>
          <div>
            <div class="uname">${u.name || '-'}</div>
            <div class="uemail">${u.email}</div>
          </div>
        </div>
        <button class="send-btn" onclick="event.stopPropagation();openChat('${u.email}','${u.name || u.email}')">message</button>
      </div>
    `).join('');
  }
  // ─── CHAT ─────────────────────────────────────────────────────
 
  function openChat(email, name) {
    chatTarget = email;
    document.getElementById('chat-avatar').textContent = name[0].toUpperCase();
    document.getElementById('chat-name').textContent = name;
    document.getElementById('chat-email-label').textContent = email;
    showView('chat');
    loadMessages(email);
  }
 
  async function loadMessages(email) {
  const res = await fetch(`/msg/${email}`, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  const data = await res.json();
  renderMessages(data.sender_message, data.receiver_messages);
}
 
 function renderMessages(received, sent) {
  const el = document.getElementById('chat-msgs');
  
  const all = [
    ...received.map(m => ({ msg: m.msg, type: 'received', time: new Date(m.createdAt) })),
    ...sent.map(m => ({ msg: m.msg, type: 'sent', time: new Date(m.createdAt) }))
  ].sort((a, b) => a.time - b.time);

  if (!all.length) { el.innerHTML = '<div class="empty">no messages yet</div>'; return; }

  el.innerHTML = all.map(m => `<div class="bubble ${m.type}">${m.msg}</div>`).join('');
  el.scrollTop = el.scrollHeight;
 }

 async function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !chatTarget) return;
  input.value = '';

  // optimistically render sent bubble
  const el = document.getElementById('chat-msgs');
  el.innerHTML = el.innerHTML.replace('<div class="empty">no messages yet</div>', '');
  el.innerHTML += `<div class="bubble sent">${text}</div>`;
  el.scrollTop = el.scrollHeight;

  // ← replace fetch with socket
  socket.emit('sendMessage', { to: chatTarget, msg: text });
}
  // ─── INBOX ────────────────────────────────────────────────────
  async function loadInbox() {
    // TODO: uncomment below
    const res = await fetch('/msg', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    renderInbox(data.messages);  // your backend returns { messages: [email, email, ...] }

    // DEMO
    // renderInbox(['alice@example.com', 'bob@example.com']);
  }

  function renderInbox(senders) {
    const el = document.getElementById('inbox-list');
    if (!senders || !senders.length) { el.innerHTML = '<div class="empty">no messages yet</div>'; return; }
    el.innerHTML = senders.map(s => `
      <div class="inbox-row" onclick="openChat('${s}','${s}')">
        <div class="badge"></div>
        <div class="avatar">${s[0].toUpperCase()}</div>
        <div>
          <div class="sender-name">${s}</div>
          <div class="hint">tap to read messages</div>
        </div>
      </div>
    `).join('');
  }






  function toggleChatMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('chat-menu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

document.addEventListener('click', () => {
  const menu = document.getElementById('chat-menu');
  if (menu) menu.style.display = 'none';
});

async function deleteChat() {
  if (!chatTarget) return;
  if (!confirm('Delete this chat for everyone?')) return;
  document.getElementById('chat-menu').style.display = 'none';

  const res = await fetch(`/msg/${chatTarget}`, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
  });

  if (res.ok) {
    document.getElementById('chat-msgs').innerHTML = '<div class="empty">no messages yet</div>';
    socket.emit('deleteChat', { to: chatTarget });
  } else {
    alert('failed to delete chat');
  }
}
</script>

</body>
</html>
